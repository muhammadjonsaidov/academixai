spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: academix

  datasource:
    url: jdbc:postgresql://localhost:5432/academix
    username: academix_user
    password: academix_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  ai:
    model:
      chat: google-genai
      embedding:
        text: google-genai
    google:
      genai:
        api-key: ${GEMINI_API_KEY:placeholder}
        chat:
          options:
            model: gemini-3.1-flash-lite
            max-output-tokens: 1024
            temperature: 0.7
        embedding:
          api-key: ${GEMINI_API_KEY:placeholder}
          text:
            model: embedding-001

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 32MB
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

academix:
  ai:
    # gemini | claude-cli | claude-api
    provider: ${AI_PROVIDER:claude-cli}

vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}

jwt:
  secret: ${JWT_SECRET:academix-super-secret-jwt-key-2026-forkbomb-hackathon-minimum-32-chars}
  expiration: 86400000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    uz.forkbomb: DEBUG
    org.springframework.security: WARN
    org.springframework.ai: INFO
    org.springdoc: WARN
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: ERROR
    org.hibernate.orm.deprecation: ERROR
